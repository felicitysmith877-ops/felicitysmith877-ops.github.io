<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flick</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="error-screen">
    <a class="back-link error-back" href="index.html">← Back</a>
    <div class="error-header">
      <div class="error-group left">
        <span class="error-label">TAPE A</span>
        <span class="error-value">PLAY</span>
        <span class="error-time">02:54:01</span>
      </div>
      <div class="error-group center">
        <span class="error-value">XXVIII</span>
      </div>
      <div class="error-group right">
        <span class="error-label">TAPE B</span>
        <span class="error-value">STOP</span>
        <span class="error-time">00:00:01</span>
      </div>
    </div>

    <div class="error-message">
      <p>ERROR 404</p>
      <p>NOT FOUND</p>
    </div>

    <div class="error-footer">
      <span>SLP SOURCE</span>
      <span>SLP DEST</span>
    </div>

    <p class="writing-note">There are far more skinks than we realised</p>
  </div>
</body>
</html>
